on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: 'ShellCheck'

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Run ShellCheck
      uses: ludeeus/action-shellcheck@master
      with: 
        ignore_paths: test/*
        additional_files: 'check_unattended_upgrades'

